version: '3.8'

services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword123
      MYSQL_DATABASE: alumni_db
      MYSQL_USER: alumni_user
      MYSQL_PASSWORD: alumni_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - PORT=5000
      - JWT_SECRET=rahasiaalumnisuperaman123
      # Gunakan DATABASE_URL ini jika sudah switch ke MySQL di prisma/schema.prisma
      - DATABASE_URL=mysql://alumni_user:alumni_password@db:3306/alumni_db
      # MinIO Storage
      - MINIO_SERVER_URL=https://manajemen-aset-minio.ltdh6w.easypanel.host
      - MINIO_ENDPOINT=manajemen-aset-minio.ltdh6w.easypanel.host
      - MINIO_PORT=443
      - MINIO_USE_SSL=true
      - MINIO_ACCESS_KEY=admin
      - MINIO_SECRET_KEY=password
      - MINIO_BUCKET=smandara
    depends_on:
      - db
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

volumes:
  db_data:
